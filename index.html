<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KESSA Quotation Generator V4 Updated</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{background:#f4f4f4}
.card{max-width:1200px;margin:auto}
table input{min-width:120px}
</style>
</head>
<body>
<div class="container py-4">
<div class="card p-4 shadow">
<h2>Kessa Integrated Solution Quotation Generator</h2>

<div class="row">
<div class="col-md-6"><input id="customer" class="form-control" placeholder="Customer"></div>
<div class="col-md-6"><input id="company" class="form-control" placeholder="Company"></div>
</div>

<div class="row mt-2">
<div class="col-md-6"><input id="customerTel" class="form-control" placeholder="Customer Telephone"></div>
<div class="col-md-6"><input id="customerEmail" class="form-control" placeholder="Customer Email"></div>
</div>

<textarea id="address" class="form-control mt-2" placeholder="Address"></textarea>

<div class="form-check mt-3">
<input class="form-check-input" type="checkbox" id="sst" checked>
<label class="form-check-label">Apply SST 8%</label>
</div>

<div class="mt-3">
<label>Discount (RM)</label>
<input id="discount" type="number" class="form-control" value="0" step="0.01">
</div>

<table class="table mt-3" id="tbl">
<thead><tr><th>Description</th><th>Part No.</th><th>Qty</th><th>Unit Price</th><th></th></tr></thead>
<tbody></tbody>
</table>

<button class="btn btn-primary" onclick="addRow()">Add Item</button>
<button class="btn btn-success" onclick="generatePDF()">Generate PDF</button>
</div>
</div>

<script>
let runningNo = localStorage.getItem('kessa_quote_no') || 1;

function addRow(){
const tr=document.createElement('tr');
tr.innerHTML=`
<td><input class="form-control desc" placeholder="Description"></td>
<td><input class="form-control partno" placeholder="Part No."></td>
<td><input class="form-control qty" type="number" value="1"></td>
<td><input class="form-control price" type="number" value="0"></td>
<td><button class="btn btn-danger" onclick="this.parentElement.parentElement.remove()">X</button></td>`;
document.querySelector('#tbl tbody').appendChild(tr);
}
addRow();

function numberToWords(num){
const ones=['','ONE','TWO','THREE','FOUR','FIVE','SIX','SEVEN','EIGHT','NINE','TEN','ELEVEN','TWELVE','THIRTEEN','FOURTEEN','FIFTEEN','SIXTEEN','SEVENTEEN','EIGHTEEN','NINETEEN'];
const tens=['','','TWENTY','THIRTY','FORTY','FIFTY','SIXTY','SEVENTY','EIGHTY','NINETY'];
function convert(n){
if(n<20) return ones[n];
if(n<100) return tens[Math.floor(n/10)] + (n%10?' '+ones[n%10]:'');
if(n<1000) return ones[Math.floor(n/100)]+' HUNDRED '+(n%100?convert(n%100):'');
if(n<1000000) return convert(Math.floor(n/1000))+' THOUSAND '+(n%1000?convert(n%1000):'');
return String(n);
}
return convert(Math.floor(num));
}

async function generatePDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();

const qNo='Q-2026-'+String(runningNo).padStart(4,'0');
localStorage.setItem('kessa_quote_no', ++runningNo);

let y=15;
doc.setFont('courier','bold');
doc.setFontSize(18);
doc.text('QUOTATION',105,y,{align:'center'});

y+=10;
doc.setFontSize(12);
doc.setFont('courier','bold');
doc.text('KESSA INTEGRATED SOLUTION',15,y);
//y+=5;
doc.setFontSize(10);
y += 5;
doc.text('SSM: 202603054901 (003828573-D)',15,y);
y += 6;

const companyAddress = [
'E96, Pangsapuri Seri Utama, Jalan PU6,',
'Taman Puchong Utama,',
'47140, Puchong, Selangor, Malaysia'
];

doc.text(companyAddress,15,y);
y += 16;

doc.text('Tel: +6011 3765 9851',15,y);
doc.text('Email: infokessa.malaysia@gmail.com',60,y);
y += 5;
doc.text('Website: www.kessa.my',15,y);

doc.text('ORIGINAL',170,15);

y += 15;
doc.text('OUR REF : '+qNo,15,y);
doc.text('DATE : '+new Date().toLocaleDateString(),130,y);

y+=10;
doc.text('Customer',15,y); doc.text(': '+document.getElementById('customer').value,45,y); y+=5;
doc.text('Company',15,y); doc.text(': '+document.getElementById('company').value,45,y); y+=5;
doc.text('Tel',15,y); doc.text(': '+document.getElementById('customerTel').value,45,y); y+=5;
doc.text('Email',15,y); doc.text(': '+document.getElementById('customerEmail').value,45,y); y+=5;

const addr=doc.splitTextToSize(document.getElementById('address').value,80);
doc.text(addr,15,y);
y += addr.length*5+8;

doc.line(10,y,200,y); y+=5;
doc.text('ITEM',15,y,{align:'center'});
doc.text('DESCRIPTION',30,y);
doc.text('PART NO.',110,y,{align:'center'});
doc.text('QTY',130,y,{align:'center'});
doc.text('UNIT PRICE (RM)',170,y,{align:'right'});
doc.text('TOTAL (RM)',195,y,{align:'right'});
y+=3; doc.line(10,y,200,y); y+=7;

let subtotal=0;
document.querySelectorAll('#tbl tbody tr').forEach((r,i)=>{
const d=r.querySelector('.desc').value||'-';
const part=r.querySelector('.partno').value||'-';
const q=parseFloat(r.querySelector('.qty').value)||0;
const p=parseFloat(r.querySelector('.price').value)||0;
const t=q*p;
subtotal+=t;

if(y > 250){
doc.addPage();
y = 20;
doc.setFont('courier','bold');
doc.line(10,y,200,y);
y+=5;
doc.text('ITEM',15,y,{align:'center'});
doc.text('DESCRIPTION',30,y);
doc.text('PART NO.',110,y,{align:'center'});
doc.text('QTY',130,y,{align:'center'});
doc.text('UNIT PRICE (RM)',170,y,{align:'right'});
doc.text('TOTAL (RM)',195,y,{align:'right'});
y+=3;
doc.line(10,y,200,y);
y+=7;
}

const descLines = doc.splitTextToSize(d, 55);
const partLines = doc.splitTextToSize(part, 20);

doc.text(String(i+1),15,y);
doc.text(descLines,30,y);
doc.text(partLines,110,y,{align:'center'});
doc.text(String(q),130,y,{align:'center'});
doc.text('RM ' + p.toFixed(2),170,y,{align:'right'});
doc.text('RM ' + t.toFixed(2),195,y,{align:'right'});

const rowHeight = Math.max(
descLines.length * 5,
partLines.length * 5,
6
);

y += rowHeight + 2;
});

const sst=document.getElementById('sst').checked ? subtotal*0.08 : 0;
const discount=parseFloat(document.getElementById('discount').value)||0;
const grand=subtotal+sst-discount;

if(y > 220){ doc.addPage(); y=20; }

y+=10;
doc.text('SUBTOTAL',130,y); doc.text('RM ' + subtotal.toFixed(2),190,y,{align:'right'});
y+=6;
doc.text('SST 8%',130,y); doc.text('RM ' + sst.toFixed(2),190,y,{align:'right'});
y+=6;
doc.text('DISCOUNT',130,y); doc.text('RM ' + discount.toFixed(2),190,y,{align:'right'});
y+=6;
doc.setFont('courier','bold');
doc.text('GRAND TOTAL',130,y); doc.text('RM ' + grand.toFixed(2),190,y,{align:'right'});

y += 12;
doc.setFont('courier','bold');
doc.text('AMOUNT IN WORDS :',15,y);
y += 6;
doc.setFont('courier','normal');
const amountWords = numberToWords(grand).toUpperCase();
doc.text('RINGGIT MALAYSIA ' + amountWords + ' ONLY',15,y);

y+=15;
doc.setFont('courier','normal');
doc.text('VALIDITY PERIOD : 30 DAYS',15,y); y+=5;
doc.text('PAYMENT TERMS : 30 DAYS',15,y); y+=5;
doc.text('BANK : HONG LEONG BANK (KESSA INTEGRATED SOLUTION)',15,y); y+=5;
doc.text('ACCOUNT : 39501264047',15,y);

y+=12;
doc.text('Prepared By,',15,y);
y+=15;
doc.text("Ts. Muhammad\ Khairul Bin Samuri",15,y);
y+=5;
doc.text('Director of Engineering & Business Development',15,y);

doc.save(qNo+'.pdf');
}
</script>
</body>
</html>
