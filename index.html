<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KESSA Quotation Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    background:#f5f5f5;
}
.card{
    border:none;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="container py-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">KESSA QUOTATION GENERATOR</h2>

<div class="row">
<div class="col-md-6 mb-3">
<label>Customer Name</label>
<input type="text" class="form-control" id="customer">
</div>

<div class="col-md-6 mb-3">
<label>Company Name</label>
<input type="text" class="form-control" id="company">
</div>
</div>

<div class="mb-3">
<label>Address</label>
<textarea class="form-control" id="address"></textarea>
</div>

<hr>

<h5>Item Details</h5>

<div class="row">
<div class="col-md-4 mb-2">
<input type="text" class="form-control" id="item" placeholder="Item Description">
</div>

<div class="col-md-2 mb-2">
<input type="number" class="form-control" id="qty" placeholder="Qty">
</div>

<div class="col-md-3 mb-2">
<input type="number" class="form-control" id="price" placeholder="Unit Price">
</div>

<div class="col-md-3 mb-2">
<button class="btn btn-primary w-100" onclick="addItem()">Add Item</button>
</div>
</div>

<table class="table mt-3">
<thead>
<tr>
<th>Description</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>
<tbody id="itemTable"></tbody>
</table>

<div class="row mt-3">
<div class="col-md-4">
<label>Discount (RM)</label>
<input type="number" class="form-control" id="discount" value="0">
</div>
</div>

<h4 class="mt-4">Grand Total: RM <span id="grandTotal">0.00</span></h4>

<button class="btn btn-success btn-lg mt-3" onclick="generatePDF()">
Generate PDF
</button>

</div>

</div>

<script>

let items = [];

function addItem(){

let item = document.getElementById("item").value;
let qty = parseFloat(document.getElementById("qty").value);
let price = parseFloat(document.getElementById("price").value);

if(!item || !qty || !price){
alert("Please fill all item fields");
return;
}

let total = qty * price;

items.push({
item,
qty,
price,
total
});

renderTable();

document.getElementById("item").value="";
document.getElementById("qty").value="";
document.getElementById("price").value="";
}

function renderTable(){

let html="";
let grand=0;

items.forEach(x=>{

grand += x.total;

html += `
<tr>
<td>${x.item}</td>
<td>${x.qty}</td>
<td>${x.price.toFixed(2)}</td>
<td>${x.total.toFixed(2)}</td>
</tr>
`;

});

document.getElementById("itemTable").innerHTML=html;

let discount =
parseFloat(document.getElementById("discount").value) || 0;

grand = grand - discount;

document.getElementById("grandTotal").innerHTML =
grand.toFixed(2);
}

document.getElementById("discount").addEventListener("input",renderTable);

async function generatePDF(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

let customer =
document.getElementById("customer").value;

let company =
document.getElementById("company").value;

let address =
document.getElementById("address").value;

let quotationNo =
"Q-" + new Date().getFullYear() + "-" +
Math.floor(Math.random()*10000);

let y = 20;

doc.setFontSize(18);
doc.text("KESSA INTEGRATED SOLUTION",20,y);

y += 10;

doc.setFontSize(10);
doc.text("Electrical | Biomedical | Green Energy",20,y);

y += 15;

doc.text("Quotation No: " + quotationNo,20,y);

y += 7;

doc.text("Date: " + new Date().toLocaleDateString(),20,y);

y += 15;

doc.text("Customer: " + customer,20,y);

y += 7;

doc.text("Company: " + company,20,y);

y += 7;

doc.text("Address: " + address,20,y);

y += 15;

doc.text("Description",20,y);
doc.text("Qty",110,y);
doc.text("Price",130,y);
doc.text("Total",170,y);

y += 5;

doc.line(20,y,190,y);

y += 10;

let grand=0;

items.forEach(x=>{

doc.text(x.item,20,y);
doc.text(String(x.qty),110,y);
doc.text(x.price.toFixed(2),130,y);
doc.text(x.total.toFixed(2),170,y);

grand += x.total;

y += 10;

});

let discount =
parseFloat(document.getElementById("discount").value) || 0;

grand -= discount;

y += 10;

doc.line(120,y,190,y);

y += 10;

doc.text("Discount : RM " + discount.toFixed(2),120,y);

y += 10;

doc.setFontSize(12);
doc.text("Grand Total : RM " + grand.toFixed(2),120,y);

doc.save(quotationNo + ".pdf");
}

</script>

</body>
</html>
